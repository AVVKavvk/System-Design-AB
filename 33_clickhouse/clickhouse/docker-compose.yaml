version: "3.9"

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: analytics_ch
    ports:
      - "8123:8123" # HTTP interface (used by the Rust client)
      - "9000:9000" # Native TCP interface
    volumes:
      - ch_data:/var/lib/clickhouse
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ch_data:
